name: Release

on:
  milestone:
    types: [closed]
  workflow_dispatch:
    inputs:
      milestone_number:
        description: "Numéro de la milestone à publier"
        required: true
        type: string

permissions:
  contents: write
  issues: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.milestone.outputs.version }}
      milestone_number: ${{ steps.milestone.outputs.number }}
    steps:
      - name: Resolve milestone metadata
        id: milestone
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MILESTONE_NUMBER="${{ inputs.milestone_number }}"
            MILESTONE_TITLE="$(gh api "repos/${{ github.repository }}/milestones/${MILESTONE_NUMBER}" --jq '.title')"
          else
            MILESTONE_NUMBER="${{ github.event.milestone.number }}"
            MILESTONE_TITLE="${{ github.event.milestone.title }}"
          fi

          if [[ -z "$MILESTONE_TITLE" ]]; then
            echo "::error::Impossible de résoudre le titre de la milestone."
            exit 1
          fi

          # Git tags cannot contain spaces or certain special characters.
          VERSION="$(echo "$MILESTONE_TITLE" | tr ' ' '-' | sed 's/[^a-zA-Z0-9._-]//g')"

          if [[ -z "$VERSION" ]]; then
            echo "::error::Le nom de la milestone « ${MILESTONE_TITLE} » n'est pas un tag Git valide."
            exit 1
          fi

          echo "number=${MILESTONE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION} (milestone #${MILESTONE_NUMBER})"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          MILESTONE_NUMBER: ${{ steps.milestone.outputs.number }}
          VERSION: ${{ steps.milestone.outputs.version }}
        run: |
          {
            echo "## Yoki ${VERSION}"
            echo

            MILESTONE_DESCRIPTION="$(gh api "repos/${{ github.repository }}/milestones/${MILESTONE_NUMBER}" --jq '.description // empty')"
            if [[ -n "$MILESTONE_DESCRIPTION" ]]; then
              echo "$MILESTONE_DESCRIPTION"
              echo
            fi

            echo "### Changes"
            echo

            ITEMS="$(gh api "repos/${{ github.repository }}/issues?milestone=${MILESTONE_NUMBER}&state=all&per_page=100" \
              --jq '.[] | "- \(.title) (#\(.number))")'

            if [[ -n "$ITEMS" ]]; then
              echo "$ITEMS"
            else
              echo "_Aucune issue ou pull request associée à cette milestone._"
            fi
          } > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          BINARY="target/${TARGET}/release/yoki"
          ARCHIVE="yoki-${VERSION}-${TARGET}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${TARGET}/release" yoki
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          $archive = "yoki-${env:VERSION}-${env:TARGET}.zip"
          Compress-Archive -Path "target/${env:TARGET}/release/yoki.exe" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoki-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: false
